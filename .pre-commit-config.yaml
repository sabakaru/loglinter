repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-imports

  - repo: local
    hooks:
      - id: go-build
        name: go-build
        entry: go build ./cmd/... ./pkg/...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-unit-tests
        name: go-unit-tests
        entry: go test -v ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: loglinter
        name: loglinter (golangci-lint plugin)
        entry: bash -c 'CGO_ENABLED=1 go build -buildmode=plugin -o loglinter.so ./plugin/main.go && $(go env GOPATH)/bin/golangci-lint run --config .golangci.yml ./...'
        language: system
        types: [go]
        pass_filenames: false
