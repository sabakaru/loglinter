name: Linter CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Unit Tests
        run: go test -v ./pkg/analyzer/...

      - name: Build Plugin
        run: CGO_ENABLED=1 go build -buildmode=plugin -o loglinter.so ./plugin/main.go

      - name: Install golangci-lint v2
        run: CGO_ENABLED=1 go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Verify with golangci-lint
        run:  $(go env GOPATH)/bin/golangci-lint run ./pkg/analyzer/testdata/src/a/... || echo "Linter found issues as expected"