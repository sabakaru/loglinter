name: Linter CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  pre-commit:
    name: Run pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Unit Tests
        run: go test -v ./pkg/analyzer/...

      - name: Build Plugin
        run: CGO_ENABLED=1 go build -buildmode=plugin -o loglinter.so ./plugin/main.go

      - name: Install golangci-lint v2
        run: CGO_ENABLED=1 go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Verify with golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run --config .golangci.yml ./pkg/analyzer/testdata/src/a/... || echo "Linter found issues as expected"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: loglinter.so
          path: loglinter.so
          retention-days: 28
